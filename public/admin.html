<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>摊主后台</title>
  <link rel="stylesheet" href="/public/styles.css">
</head>
<body class="admin-body">
  <section id="loginView" class="login-view">
    <form id="loginForm" class="login-card">
      <h1>摊主后台</h1>
      <label id="loginStaffLabel" class="login-field">摊员身份
        <select id="loginStaffSelect"></select>
        <input id="loginStaffInput" type="text" placeholder="摊员名字" hidden>
      </label>
      <input id="passwordInput" type="password" placeholder="后台密码" autocomplete="current-password">
      <button class="primary-btn" type="submit">进入后台</button>
      <p class="hint">忘记密码时，请回看项目文档里的《重置密码说明》。</p>
    </form>
  </section>

  <section id="adminMount"></section>

  <script src="/public/admin.js"></script>
</body>
</html>
